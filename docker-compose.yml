x-airflow-common: &airflow-common
  image: apache/airflow:2.10.3
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://finance:${POSTGRES_PASSWORD}@postgres:5432/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://finance:${POSTGRES_PASSWORD}@postgres:5432/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    DATABASE_URL_SYNC: postgresql://finance:${POSTGRES_PASSWORD}@postgres:5432/finance
    REDIS_URL: redis://redis:6379/0
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./ml:/opt/finance/ml
    - ./dbt:/opt/airflow/dbt
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:
  # ─────────────────────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: qv-postgres
    restart: unless-stopped
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finance_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-finance}
      POSTGRES_MULTIPLE_DATABASES: finance,airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-finance}"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - finance-net

  # ─────────────────────────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: qv-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    networks:
      - finance-net

  # ─────────────────────────────────────────────────────────────
  # FastAPI Application
  # ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      target: runtime
    container_name: qv-api
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-finance}
      POSTGRES_USER: ${POSTGRES_USER:-finance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MLFLOW_TRACKING_URI: http://mlflow:5000
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
      BRAPI_TOKEN: ${BRAPI_TOKEN:-}
      LOG_FORMAT: json
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./app:/app/app:ro
      - ./ml:/app/ml:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    networks:
      - finance-net

  # ─────────────────────────────────────────────────────────────
  # MLflow Tracking Server
  # ─────────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    container_name: qv-mlflow
    restart: unless-stopped
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finance-net

  # ─────────────────────────────────────────────────────────────
  # Streamlit Dashboard
  # ─────────────────────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      target: streamlit
    container_name: qv-streamlit
    restart: unless-stopped
    command: streamlit run dashboards/streamlit/app.py --server.port 8501 --server.headless true
    environment:
      API_URL: http://api:8000/api/v1
    volumes:
      - ./dashboards:/app/dashboards:ro
      - ./dashboards/streamlit/.streamlit:/app/.streamlit:ro
    ports:
      - "8501:8501"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      - api
    networks:
      - finance-net

  # ─────────────────────────────────────────────────────────────
  # Airflow — Webserver
  # ─────────────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: qv-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - finance-net

  airflow-scheduler:
    <<: *airflow-common
    container_name: qv-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - finance-net

  airflow-worker:
    <<: *airflow-common
    container_name: qv-airflow-worker
    command: celery worker
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - finance-net

  airflow-init:
    <<: *airflow-common
    container_name: qv-airflow-init
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _AIRFLOW_WWW_USER_FIRSTNAME: Admin
      _AIRFLOW_WWW_USER_LASTNAME: User
      _AIRFLOW_WWW_USER_EMAIL: admin@finance.io
      _AIRFLOW_WWW_USER_ROLE: Admin
    networks:
      - finance-net

# ─────────────────────────────────────────────────────────────
# Volumes & Networks
# ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  mlflow_artifacts:

networks:
  finance-net:
    driver: bridge
